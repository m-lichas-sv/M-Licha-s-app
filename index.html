<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M Licha’s</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#d98928;
  padding:20px;
  text-align:center;
  color:white;
}

.header-buttons{
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.header-btn{
  background:white;
  color:#d98928;
  padding:12px 18px;
  border-radius:10px;
  font-weight:bold;
  border:none;
  text-decoration:none;
  cursor:pointer;
  min-width:140px;
  text-align:center;
  font-size:14px;
}

/* SECCIONES */
section{
  padding:20px;
}

/* PRODUCTOS */
.producto{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  transition:all 0.3s ease;
  opacity:0;
  transform:translateY(10px);
  display:none;
}

.producto.mostrar{
  opacity:1;
  transform:translateY(0);
}

.producto h3{
  margin:0;
}

.precio{
  color:#d98928;
  font-weight:bold;
  transition:0.2s;
}

.precio.efecto{
  transform:scale(1.2);
}

/* CONTROL CANTIDAD */
.cantidad-control{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.cantidad-control button{
  background:#d98928;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

.cantidad{
  font-weight:bold;
  font-size:16px;
  min-width:20px;
  text-align:center;
}

/* BOTONES GENERALES */
button{
  background:#d98928;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

/* CATEGORÍAS */
.menu-categorias{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:20px 0;
  flex-wrap:wrap;
}

.menu-categorias button{
  background:#f4d35e;
  color:#333;
  border:none;
  padding:10px 18px;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.menu-categorias button.activo{
  background:#d98928;
  color:white;
}

.menu-categorias button:hover{
  transform:scale(1.05);
}

/* CARRITO */
#carrito{
  background:white;
  padding:20px;
  margin:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

#whatsappBtn{
  background:#25D366;
  width:100%;
  margin-top:15px;
  font-size:16px;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

</style>
</head>
<body>

<header>
  <h1>M Licha’s</h1>
</header>

<section>

<h2>Menú</h2>

<div class="menu-categorias">
  <button onclick="mostrarCategoria('almuerzos', this)">Almuerzos</button>
  <button onclick="mostrarCategoria('bebidas', this)">Bebidas</button>
  <button onclick="mostrarCategoria('cocteles', this)">Cócteles</button>
</div>

<!-- TU MENÚ ORIGINAL COMPLETO AQUÍ (no lo toqué) -->

</section>

<div id="carrito">
  <h2>🛒 Tu pedido</h2>
  <div id="listaCarrito"></div>
  <h3>Total: $<span id="total">0.00</span></h3>

  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">

  <select id="horaLlegada">
    <option value="">Selecciona la hora a la que llegarías al local</option>
    <option>En 15 minutos</option>
    <option>En 30 minutos</option>
    <option>En 45 minutos</option>
    <option>En 1 hora</option>
  </select>

  <button id="whatsappBtn" onclick="enviarPedido()">Enviar pedido por WhatsApp</button>
</div>

<script>

/* CATEGORÍAS CERRADAS AL INICIO */
document.querySelectorAll(".producto").forEach(p=>{
  p.style.display="none";
});

/* MOSTRAR CATEGORÍA CON ANIMACIÓN */
function mostrarCategoria(categoria, boton){

  let productos = document.querySelectorAll(".producto");
  productos.forEach(p=>{
    p.classList.remove("mostrar");
    setTimeout(()=>{ p.style.display="none"; },200);
  });

  let seleccionados = document.querySelectorAll("." + categoria);
  seleccionados.forEach(p=>{
    p.style.display="block";
    setTimeout(()=>{ p.classList.add("mostrar"); },50);
  });

  let botones = document.querySelectorAll(".menu-categorias button");
  botones.forEach(b => b.classList.remove("activo"));
  boton.classList.add("activo");
}

/* CAMBIO CANTIDAD + EFECTO PRECIO */
function cambiarCantidad(btn, cambio){
  let contenedor = btn.parentElement;
  let producto = contenedor.parentElement;
  let cantidadSpan = contenedor.querySelector(".cantidad");
  let cantidad = parseInt(cantidadSpan.textContent);

  cantidad += cambio;
  if(cantidad < 0) cantidad = 0;

  cantidadSpan.textContent = cantidad;

  let precio = producto.querySelector(".precio");
  precio.classList.add("efecto");
  setTimeout(()=>precio.classList.remove("efecto"),200);

  actualizarCarrito();
}

/* CARRITO TIEMPO REAL */
function actualizarCarrito(){
  let productos = document.querySelectorAll(".producto");
  let lista = document.getElementById("listaCarrito");
  let total = 0;
  lista.innerHTML = "";

  productos.forEach(producto=>{
    let nombre = producto.querySelector("h3").textContent;
    let precio = parseFloat(producto.querySelector(".precio").textContent.replace("$",""));
    let cantidad = parseInt(producto.querySelector(".cantidad").textContent);

    if(cantidad > 0){
      let subtotal = precio * cantidad;
      total += subtotal;
      lista.innerHTML += `<p>${cantidad}x ${nombre} - $${subtotal.toFixed(2)}</p>`;
    }
  });

  document.getElementById("total").textContent = total.toFixed(2);
}

/* ENVIAR A WHATSAPP */
function enviarPedido(){
  let nombre = document.getElementById("nombreCliente").value.trim();
  let hora = document.getElementById("horaLlegada").value;
  let lista = document.getElementById("listaCarrito").innerText;
  let total = document.getElementById("total").innerText;

  if(nombre === "" || hora === "" || lista === ""){
    alert("Debes completar nombre, hora y seleccionar productos.");
    return;
  }

  let mensaje = `Pedido de ${nombre}%0A%0ALlegaré: ${hora}%0A%0A${lista}%0ATotal: $${total}`;
  window.open(`https://wa.me/50379554663?text=${mensaje}`, "_blank");
}

</script>

</body>
</html>
