<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M Licha’s</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#d98928;
  padding:20px;
  text-align:center;
  color:white;
}

.header-buttons{
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.header-btn{
  background:white;
  color:#d98928;
  padding:12px 18px;
  border-radius:10px;
  font-weight:bold;
  border:none;
  text-decoration:none;
  cursor:pointer;
  min-width:140px;
  text-align:center;
  font-size:14px;
}

/* SECCIONES */
section{
  padding:20px;
}

/* PRODUCTOS */
.producto{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  transition:0.3s;
}

.producto h3{
  margin:0;
}

.precio{
  color:#d98928;
  font-weight:bold;
}

/* CONTROL CANTIDAD */
.cantidad-control{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.cantidad-control button{
  background:#d98928;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

.cantidad{
  font-weight:bold;
  font-size:16px;
  min-width:20px;
  text-align:center;
}

/* BOTONES GENERALES */
button{
  background:#d98928;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

/* CATEGORÍAS */
.menu-categorias{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:20px 0;
  flex-wrap:wrap;
}

.menu-categorias button{
  background:#f4d35e;
  color:#333;
  border:none;
  padding:10px 18px;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.menu-categorias button.activo{
  background:#d98928;
  color:white;
}

.menu-categorias button:hover{
  transform:scale(1.05);
}

/* CARRITO */
#carrito{
  background:white;
  padding:20px;
  margin:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

#whatsappBtn{
  background:#25D366;
  margin-top:15px;
  width:100%;
  font-size:16px;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

</style>
</head>
<body>

<header>
  <h1>M Licha’s</h1>

  <div class="header-buttons">
    <a class="header-btn" href="https://maps.google.com" target="_blank">📍 Maps</a>
    <button class="header-btn" onclick="mostrarCupones()">🎁 Cupón</button>
    <button class="header-btn" onclick="mostrarReservacion()">📅 Reservación</button>
  </div>
</header>

<section id="paginaInicio">

<h2>Menú</h2>

<div class="menu-categorias">
  <button onclick="mostrarCategoria('almuerzos', this)" class="activo">Almuerzos</button>
  <button onclick="mostrarCategoria('bebidas', this)">Bebidas</button>
  <button onclick="mostrarCategoria('cocteles', this)">Cócteles</button>
</div>

<!-- TODO TU MENÚ SE MANTIENE IGUAL -->
<!-- (No lo modifiqué, solo agregué data-precio a cada producto) -->

<script>
// Agregar precios dinámicamente
document.querySelectorAll(".producto").forEach(producto=>{
  let precioTexto = producto.querySelector(".precio").textContent.replace("$","");
  producto.setAttribute("data-precio", precioTexto);
});
</script>

</section>

<!-- CARRITO -->
<div id="carrito">
  <h2>🛒 Tu pedido</h2>
  <div id="listaCarrito"></div>
  <h3>Total: $<span id="total">0.00</span></h3>

  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">

  <select id="horaLlegada">
    <option value="">Selecciona la hora a la que llegarías al local</option>
    <option>En 15 minutos</option>
    <option>En 30 minutos</option>
    <option>En 45 minutos</option>
    <option>En 1 hora</option>
  </select>

  <button id="whatsappBtn" onclick="enviarPedido()">Enviar pedido por WhatsApp</button>
</div>

<script>

/* FUNCIONES ORIGINALES */
function mostrarCategoria(categoria, boton){
  let productos = document.querySelectorAll(".producto");
  productos.forEach(p => p.style.display="none");

  let seleccionados = document.querySelectorAll("." + categoria);
  seleccionados.forEach(p => p.style.display="block");

  let botones = document.querySelectorAll(".menu-categorias button");
  botones.forEach(b => b.classList.remove("activo"));

  boton.classList.add("activo");
}

function cambiarCantidad(btn, cambio){
  let contenedor = btn.parentElement;
  let cantidadSpan = contenedor.querySelector(".cantidad");
  let cantidad = parseInt(cantidadSpan.textContent);

  cantidad += cambio;
  if(cantidad < 0) cantidad = 0;

  cantidadSpan.textContent = cantidad;
  actualizarCarrito();
}

/* NUEVO CARRITO */
function actualizarCarrito(){
  let productos = document.querySelectorAll(".producto");
  let lista = document.getElementById("listaCarrito");
  let total = 0;
  lista.innerHTML = "";

  productos.forEach(producto=>{
    let nombre = producto.querySelector("h3").textContent;
    let precio = parseFloat(producto.getAttribute("data-precio"));
    let cantidad = parseInt(producto.querySelector(".cantidad").textContent);

    if(cantidad > 0){
      let subtotal = precio * cantidad;
      total += subtotal;

      lista.innerHTML += `<p>${cantidad}x ${nombre} - $${subtotal.toFixed(2)}</p>`;
    }
  });

  document.getElementById("total").textContent = total.toFixed(2);
}

/* WHATSAPP */
function enviarPedido(){
  let nombre = document.getElementById("nombreCliente").value;
  let hora = document.getElementById("horaLlegada").value;
  let lista = document.getElementById("listaCarrito").innerText;
  let total = document.getElementById("total").innerText;

  if(!nombre || !hora || !lista){
    alert("Completa nombre, hora y selecciona productos.");
    return;
  }

  let mensaje = `Pedido de ${nombre}%0A%0ALlegaré: ${hora}%0A%0A${lista}%0ATotal: $${total}`;

  window.open(`https://wa.me/50379554663?text=${mensaje}`, "_blank");
}

/* BOTONES HEADER */
function mostrarCupones(){
  alert("🎁 Cupón disponible: 10% de descuento en tu próxima visita.");
}

function mostrarReservacion(){
  alert("📅 Para reservaciones escríbenos por WhatsApp.");
}

</script>

</body>
</html>
